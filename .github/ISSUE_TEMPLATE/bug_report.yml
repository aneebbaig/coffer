name: Bug report
description: Report a problem in the web app, mobile app, or API
labels: [bug]
body:
  - type: dropdown
    id: area
    attributes:
      label: Which part?
      options:
        - Web app
        - Mobile app
        - API
        - Not sure
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser or Android version, app version/commit.
    validations:
      required: false
