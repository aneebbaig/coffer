name: Build & Release APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.44.4"

defaults:
  run:
    working-directory: apps/mobile

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: pub-${{ env.FLUTTER_VERSION }}-${{ hashFiles('apps/mobile/pubspec.lock') }}
          restore-keys: pub-${{ env.FLUTTER_VERSION }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Write key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.jks
          EOF

      - name: Build signed APK
        env:
          APP_NAME: ${{ vars.MOBILE_APP_NAME || 'Coffer' }}
          APP_ID: ${{ vars.MOBILE_APP_ID || 'com.coffer.app' }}
        run: |
          VERSION="${{ github.ref_name }}"
          BUILD_NAME="${VERSION#v}"
          flutter build apk --release \
            --no-pub \
            --target-platform android-arm64 \
            --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }} \
            --dart-define=APP_NAME="$APP_NAME" \
            -PappName="$APP_NAME" \
            -PappId="$APP_ID" \
            --build-name="$BUILD_NAME" \
            --build-number=${{ github.run_number }} \
            --split-debug-info=build/debug-symbols \
            --obfuscate

      # Guard: the launcher label must match the configured app name. Catches
      # the branding flags silently going missing from the build step above -
      # already happened once, the APK just installed labeled "Coffer".
      - name: Verify branding
        env:
          EXPECTED_LABEL: ${{ vars.MOBILE_APP_NAME || 'Coffer' }}
        run: |
          APK=apps/mobile/build/app/outputs/flutter-apk/app-release.apk
          AAPT="$(ls "$ANDROID_HOME"/build-tools/*/aapt 2>/dev/null | sort -V | tail -1)"
          if [ -z "$AAPT" ]; then echo "::error::aapt not found"; exit 1; fi
          LABEL="$("$AAPT" dump badging "$APK" | grep -oE "application-label:'[^']*'" | head -1 | cut -d"'" -f2)"
          echo "APK launcher label: '$LABEL'"
          if [ "$LABEL" != "$EXPECTED_LABEL" ]; then
            echo "::error::APK label is '$LABEL', expected '$EXPECTED_LABEL'. The branding flags are missing from the build step."
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/mobile/build/app/outputs/flutter-apk/app-release.apk
          name: "${{ vars.MOBILE_APP_NAME || 'Coffer' }} ${{ github.ref_name }}"
          generate_release_notes: true
